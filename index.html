<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CACON STOCK JOURNAL PRO v42 — Content Quality Upgrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css?v=42">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060b14">
</head>
<body class="text-slate-800 dark:text-slate-200 min-h-screen flex flex-col overflow-hidden">

<!-- LANDING PAGE -->
<div id="landing-page" class="fixed inset-0 z-[300] flex flex-col items-center justify-center p-6 text-center overflow-hidden" style="background:var(--bg-base)">
    <div class="intro-glass relative z-10 p-12 rounded-[40px] max-w-lg w-full flex flex-col items-center fade-in">
        <div class="mb-8 p-5 bg-white/5 rounded-3xl border border-white/10 shadow-2xl animate-float">
            <i data-lucide="footprints" class="w-16 h-16" style="color:var(--green)"></i>
        </div>
        <h1 style="font-family:var(--font-display);font-size:3rem;font-weight:900;color:white;margin-bottom:24px;letter-spacing:-.02em">CACON<span style="color:var(--green)">_STOCK</span></h1>
        <div class="relative mb-12">
            <p style="font-size:1.1rem;color:var(--tx-mid);font-weight:300;font-style:italic;line-height:1.8">"Hành trình vạn dặm bắt đầu bằng một bước chân."</p>
            <p style="font-size:.75rem;color:var(--tx-lo);margin-top:16px;text-transform:uppercase;letter-spacing:.15em;font-weight:700">— Lão Tử —</p>
        </div>
        <button id="btn-enter-system" style="width:100%;padding:16px;background:rgba(0,229,160,.15);border:1px solid var(--green);border-radius:16px;color:var(--green);font-weight:700;cursor:pointer;transition:.3s ease" onmouseover="this.style.background='rgba(0,229,160,.25)'" onmouseout="this.style.background='rgba(0,229,160,.15)'">
            BẮT ĐẦU <i data-lucide="arrow-right" style="width:16px;height:16px;display:inline-block;margin-left:8px"></i>
        </button>
    </div>
    <div style="position:absolute;bottom:32px;font-size:.65rem;color:var(--tx-lo);font-family:var(--font-mono);z-index:10;opacity:.7">v42 — Professional Trading Journal OS</div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-4 hidden" style="background:rgba(0,0,0,.5);backdrop-filter:blur(8px)">
    <div style="background:var(--bg-raised);border:1px solid var(--border-mid);border-radius:16px;padding:32px;width:100%;max-width:400px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)">
        <div style="text-align:center;margin-bottom:32px">
            <h1 style="font-size:1.5rem;font-weight:700;color:var(--tx-hi)">Xác Thực</h1>
            <p style="font-size:.75rem;color:var(--tx-lo);margin-top:4px">Đăng nhập hệ thống Cloud</p>
        </div>
        <div id="login-form" style="display:flex;flex-direction:column;gap:16px">
            <input type="text" id="login-user" style="width:100%;background:var(--bg-base);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--tx-hi);font-size:.9rem;outline:none" placeholder="Tên đăng nhập" onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
            <input type="password" id="login-pass" style="width:100%;background:var(--bg-base);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--tx-hi);font-size:.9rem;outline:none" placeholder="Mật khẩu" onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
            <button onclick="authLogin()" style="width:100%;background:var(--green);color:#022a1e;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;transition:.2s">VÀO HỆ THỐNG</button>
            <p style="text-align:center;font-size:.85rem;color:var(--tx-mid);margin-top:12px;cursor:pointer" onclick="toggleAuth()">Chưa có tài khoản? <b style="color:var(--green)">Đăng ký</b></p>
        </div>
        <div id="register-form" style="display:none;flex-direction:column;gap:16px">
            <input type="text" id="reg-user" style="width:100%;background:var(--bg-base);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--tx-hi);font-size:.9rem;outline:none" placeholder="Tên đăng nhập">
            <input type="email" id="reg-email" style="width:100%;background:var(--bg-base);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--tx-hi);font-size:.9rem;outline:none" placeholder="Email">
            <input type="password" id="reg-pass" style="width:100%;background:var(--bg-base);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--tx-hi);font-size:.9rem;outline:none" placeholder="Mật khẩu">
            <button onclick="authRegister()" style="width:100%;background:var(--blue);color:white;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer">GỬI YÊU CẦU</button>
            <p style="text-align:center;font-size:.85rem;color:var(--tx-mid);margin-top:12px;cursor:pointer" onclick="toggleAuth()">← Quay lại</p>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app-container" class="hidden flex flex-col h-screen relative z-10" style="background:var(--bg-base)">
    <header style="height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:var(--bg-surface)">
        <div onclick="switchTab('dashboard')" style="display:flex;align-items:center;gap:12px;cursor:pointer">
            <div style="width:32px;height:32px;border-radius:8px;background:rgba(0,229,160,.15);border:1px solid var(--green);display:flex;align-items:center;justify-content:center">
                <i data-lucide="candlestick-chart" style="width:16px;height:16px;color:var(--green)"></i>
            </div>
            <div class="hidden sm:block">
                <p style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx-lo)">Trading OS</p>
                <p style="font-size:.95rem;font-weight:700;color:var(--tx-hi)">CACON STOCK</p>
            </div>
        </div>
        
        <div style="display:flex;align-items:center;gap:12px;padding:0 12px;border-radius:8px;background:rgba(96,165,250,.05);border:1px solid rgba(96,165,250,.1)">
            <span style="font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--tx-lo)">User</span>
            <span id="current-user-chip" style="font-size:.85rem;font-weight:700;color:var(--tx-hi)">Loading...</span>
            <span id="role-chip" style="font-size:.65rem;background:rgba(59,130,246,.2);color:var(--blue);padding:2px 6px;border-radius:4px;font-weight:700">Member</span>
        </div>

        <div style="display:flex;align-items:center;gap:8px">
            <button id="theme-toggle-btn" onclick="toggleTheme()" style="width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
                <i data-lucide="moon" style="width:16px;height:16px;color:var(--tx-mid)"></i>
            </button>
            <button id="btn-admin-panel" onclick="openAdminPanel()" style="width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;display:none" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
                <i data-lucide="shield-alert" style="width:16px;height:16px;color:var(--amber)"></i>
            </button>
            <button onclick="authLogout()" style="width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
                <i data-lucide="log-out" style="width:16px;height:16px;color:var(--tx-mid)"></i>
            </button>
        </div>
    </header>

    <nav style="display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg-surface);overflow-x:auto;align-items:center">
        <button data-tab-btn="dashboard" onclick="switchTab('dashboard')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">📊 Dashboard</button>
        <button data-tab-btn="journal" onclick="switchTab('journal')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">📓 Journal</button>
        <button data-tab-btn="analysis" onclick="switchTab('analysis')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">🔍 Phân Tích</button>
        <button data-tab-btn="wiki" onclick="switchTab('wiki')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">📚 Wiki Setup</button>
        <button data-tab-btn="library" onclick="switchTab('library')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">📖 Thư Viện</button>
        <button data-tab-btn="mistakes" onclick="switchTab('mistakes')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">⚠️ Sai Lầm</button>
        <button data-tab-btn="psychology" onclick="switchTab('psychology')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">🧠 Tâm Lý</button>
        <button data-tab-btn="discipline" onclick="switchTab('discipline')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">💪 Kỷ Luật</button>
        <button data-tab-btn="quotes" onclick="switchTab('quotes')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">💎 Nguyên Tắc</button>
        <button data-tab-btn="training" onclick="switchTab('training')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">🎯 Training</button>
        <button data-tab-btn="settings" onclick="switchTab('settings')" style="padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--tx-mid);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;text-transform:uppercase;letter-spacing:.05em">⚙️ Settings</button>
    </nav>

    <main style="flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column">
        <!-- TABS CONTENT WILL BE INSERTED BY JS -->
        <div id="tab-dashboard"></div>
        <div id="tab-journal" class="hidden"></div>
        <div id="tab-analysis" class="hidden"></div>
        <div id="tab-wiki" class="hidden"></div>
        <div id="tab-library" class="hidden"></div>
        <div id="tab-mistakes" class="hidden"></div>
        <div id="tab-psychology" class="hidden"></div>
        <div id="tab-discipline" class="hidden"></div>
        <div id="tab-quotes" class="hidden"></div>
        <div id="tab-training" class="hidden"></div>
        <div id="tab-settings" class="hidden"></div>
    </main>
</div>

<!-- MODALS WILL BE INSERTED BY CSS -->

<script type="module" src="app.js"></script>
</body>
</html>
